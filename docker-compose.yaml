# promptgram/docker-compose.yaml

services:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - app-net

  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    expose:
      - "8000"
    volumes:
      - ./backend:/app                  # ← hot reload
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-net

  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: prompt_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data   # ← Postgres 18+ path
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - app-net

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9001:9001"
    expose:
      - "9000"
    volumes:
      - minio_data:/data                # ← persist minio data
    networks:
      - app-net

  # frontend:
  #   build: ./frontend
  #   expose:
  #     - "3000"
  #   networks:
  #     - app-net

volumes:
  postgres_data:
  minio_data:

networks:
  app-net:
    driver: bridge