# promptgram/docker-compose.yaml

services:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - app-net

  # backend:
  #   build: ./backend
  #   expose:
  #     - "8000"
  #   env_file:
  #     - ./backend/.env        # reuse the same .env you already have
  #   depends_on:
  #     - postgres
  #     - redis
  #   networks:
  #     - app-net

  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: prompt_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy   # ← waits for healthcheck to pass
      redis:
        condition: service_started
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    networks:
      - app-net

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9001:9001"           # console only — backend talks to it internally
    expose:
      - "9000"
    networks:
      - app-net

  # frontend:                 # uncomment when frontend is ready
  #   build: ./frontend
  #   expose:
  #     - "3000"
  #   networks:
  #     - app-net

volumes:
  postgres_data:

networks:
  app-net:
    driver: bridge