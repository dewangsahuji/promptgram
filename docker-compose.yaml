

services:

  # ─── Frontend (React SPA) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: promptgram_frontend
    volumes:
      - frontend_dist:/html   # CMD copies /dist → /html then exits 0
    networks:
      - promptgram_net

  # ─── API Gateway ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: promptgram_gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      frontend:
        condition: service_completed_successfully
      auth-service:
        condition: service_healthy
      prompt-service:
        condition: service_healthy
      social-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - promptgram_net

  # ─── Auth Service ────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: promptgram_auth
    ports:
      - "8001:8001"
    env_file:
      - ./services/auth/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - promptgram_net

  # ─── Prompt Service ──────────────────────────────────────────────────────────
  prompt-service:
    build:
      context: ./services/prompt
      dockerfile: Dockerfile
    container_name: promptgram_prompt
    ports:
      - "8002:8002"
    env_file:
      - ./services/prompt/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - promptgram_net

  # ─── Social Service ──────────────────────────────────────────────────────────
  social-service:
    build:
      context: ./services/social
      dockerfile: Dockerfile
    container_name: promptgram_social
    ports:
      - "8003:8003"
    env_file:
      - ./services/social/.env
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      prompt-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - promptgram_net

  # ─── AI Service ──────────────────────────────────────────────────────────────
  ai-service:
    build:
      context: ./services/ai
      dockerfile: Dockerfile
    container_name: promptgram_ai
    ports:
      - "8004:8004"
    env_file:
      - ./services/ai/.env
    depends_on:
      qdrant:
        condition: service_started   # Qdrant has no curl; readiness checked by lifespan
      prompt-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s   # ML models take time to load
    restart: unless-stopped
    networks:
      - promptgram_net

  # ─── PostgreSQL (shared instance, one DB per service) ────────────────────────
  postgres:
    image: postgres:16
    container_name: promptgram_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - promptgram_net

  # ─── Redis (shared — JWT blacklist, caching) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: promptgram_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - promptgram_net

  # ─── Qdrant (vector DB for CLIP embeddings) ──────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: promptgram_qdrant
    ports:
      - "6333:6333"   # REST / gRPC API
      - "6334:6334"   # Web UI
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - promptgram_net

  # ─── MinIO (S3-compatible local dev storage) ─────────────────────────────────
  minio:
    image: minio/minio
    container_name: promptgram_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - promptgram_net

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
  frontend_dist:

networks:
  promptgram_net:
    driver: bridge
