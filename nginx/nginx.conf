events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream auth_service    { server auth-service:8001; }
    upstream prompt_service  { server prompt-service:8002; }
    upstream social_service  { server social-service:8003; }
    upstream ai_service      { server ai-service:8004; }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    client_max_body_size 15M;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    server {
        listen 80;
        server_name _;

        # ─── Internal auth_request subrequest ─────────────────────────
        # Nginx forwards the original Authorization header to this location.
        # auth-service /auth/validate returns:
        #   200 + X-User-Id header  → allowed
        #   401                     → blocked
        location = /internal/auth/validate {
            internal;
            proxy_pass              http://auth_service/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length   "";
            proxy_set_header        X-Original-URI   $request_uri;
            # Forward the original Authorization header so auth-service sees the api_token
            proxy_set_header        Authorization    $http_authorization;
        }

        # ─── Auth Service (public — no auth_request) ──────────────────
        # login, signup, authorize, api-token are open by design.
        location /api/auth/ {
            proxy_pass         http://auth_service/auth/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ─── Prompt Service ────────────────────────────────────────────
        location /api/prompts/ {
            auth_request        /internal/auth/validate;
            # Capture X-User-Id returned by auth-service and inject it upstream
            auth_request_set    $x_user_id $upstream_http_x_user_id;
            proxy_set_header    X-User-Id         $x_user_id;

            proxy_pass         http://prompt_service/prompts/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /api/images/ {
            auth_request        /internal/auth/validate;
            auth_request_set    $x_user_id $upstream_http_x_user_id;
            proxy_set_header    X-User-Id         $x_user_id;

            proxy_pass         http://prompt_service/images/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            client_max_body_size 15M;
        }

        # ─── Social Service ────────────────────────────────────────────
        location /api/like/ {
            auth_request        /internal/auth/validate;
            auth_request_set    $x_user_id $upstream_http_x_user_id;
            proxy_set_header    X-User-Id  $x_user_id;

            proxy_pass         http://social_service/like/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/comment/ {
            auth_request        /internal/auth/validate;
            auth_request_set    $x_user_id $upstream_http_x_user_id;
            proxy_set_header    X-User-Id  $x_user_id;

            proxy_pass         http://social_service/comment/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/follow/ {
            auth_request        /internal/auth/validate;
            auth_request_set    $x_user_id $upstream_http_x_user_id;
            proxy_set_header    X-User-Id  $x_user_id;

            proxy_pass         http://social_service/follow/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/collections/ {
            auth_request        /internal/auth/validate;
            auth_request_set    $x_user_id $upstream_http_x_user_id;
            proxy_set_header    X-User-Id  $x_user_id;

            proxy_pass         http://social_service/collections/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/users/ {
            auth_request        /internal/auth/validate;
            auth_request_set    $x_user_id $upstream_http_x_user_id;
            proxy_set_header    X-User-Id  $x_user_id;

            proxy_pass         http://social_service/users/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── AI Service ────────────────────────────────────────────────
        location /api/ai/ {
            auth_request        /internal/auth/validate;
            auth_request_set    $x_user_id $upstream_http_x_user_id;
            proxy_set_header    X-User-Id         $x_user_id;

            proxy_pass         http://ai_service/ai/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ─── React SPA (catch-all) ─────────────────────────────────────
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        # ─── Static assets ─────────────────────────────────────────────
        location ~* \.(js|css|png|svg|ico|woff2?)$ {
            root  /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
