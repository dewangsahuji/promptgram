events {}

http {
    include       mime.types;
    default_type  application/octet-stream;

    upstream backend {
        server backend:8000;   # "backend" = Docker Compose service name
    }

    upstream frontend {
        server frontend:3000;  # "frontend" = Docker Compose service name
    }

    server {
        listen 80;

        # --- API requests → FastAPI ---
        location /api/ {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Required for file uploads (your S3 upload endpoint)
            client_max_body_size 15M;
        }

        # --- Everything else → React ---
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;

            # Needed for React Router (client-side routing)
            try_files $uri $uri/ /index.html;
        }
    }
}