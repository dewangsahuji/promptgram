events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream auth_service    { server auth-service:8001; }
    upstream prompt_service  { server prompt-service:8002; }
    upstream social_service  { server social-service:8003; }
    upstream ai_service      { server ai-service:8004; }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    client_max_body_size 15M;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # ─── Upstream Selection Maps (Avoid Nginx "if" body loss bug) ────────────
    
    map $request_method $prompt_upstream {
        POST   http://auth_service;
        PATCH  http://auth_service;
        DELETE http://auth_service;
        default http://prompt_service;
    }

    map $request_method $images_upstream {
        POST   http://auth_service;
        DELETE http://auth_service;
        default http://prompt_service;
    }

    map $request_method $like_upstream {
        POST   http://auth_service;
        default http://social_service;
    }

    map $request_method $comment_upstream {
        POST   http://auth_service;
        DELETE http://auth_service;
        default http://social_service;
    }

    map $request_method $follow_upstream {
        POST   http://auth_service;
        default http://social_service;
    }

    map $request_method $collections_upstream {
        POST   http://auth_service;
        default http://social_service;
    }

    server {
        listen 80;
        server_name _;

        # ─── Auth Service ──────────────────────────────────────────────
        location /api/auth/ {
            proxy_pass         http://auth_service/auth/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ─── Prompt Service ────────────────────────────────────────────
        location /api/prompts/ {
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            rewrite            ^/api/prompts/(.*)$ /prompts/$1 break;
            proxy_pass         $prompt_upstream;
        }

        location /api/images/ {
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            client_max_body_size 15M;

            rewrite            ^/api/images/(.*)$ /images/$1 break;
            proxy_pass         $images_upstream;
        }

        # ─── Social Service ────────────────────────────────────────────
        location /api/like/ {
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            rewrite            ^/api/like/(.*)$ /like/$1 break;
            proxy_pass         $like_upstream;
        }

        location /api/comment/ {
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            rewrite            ^/api/comment/(.*)$ /comment/$1 break;
            proxy_pass         $comment_upstream;
        }

        location /api/follow/ {
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            rewrite            ^/api/follow/(.*)$ /follow/$1 break;
            proxy_pass         $follow_upstream;
        }

        location /api/collections/my {
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            rewrite            ^/api/collections/my(.*)$ /collections/my$1 break;
            proxy_pass         http://auth_service;
        }

        location /api/collections/ {
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            rewrite            ^/api/collections/(.*)$ /collections/$1 break;
            proxy_pass         $collections_upstream;
        }

        location /api/users/ {
            proxy_pass         http://social_service/users/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── AI Service ────────────────────────────────────────────────
        location /api/ai/ {
            proxy_pass         http://ai_service/ai/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ─── React SPA (catch-all) ─────────────────────────────────────
        # Must come LAST so /api/* routes take priority
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;   # SPA client-side routing
        }

        # ─── Static assets (cache aggressively) ───────────────────────
        location ~* \.(js|css|png|svg|ico|woff2?)$ {
            root  /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
