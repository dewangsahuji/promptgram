events {
    worker_connections 1024;
}

http {
    upstream auth_service    { server auth-service:8001; }
    upstream prompt_service  { server prompt-service:8002; }
    upstream social_service  { server social-service:8003; }
    upstream ai_service      { server ai-service:8004; }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    client_max_body_size 15M;

    server {
        listen 80;
        server_name _;

        # ─── Auth Service ──────────────────────────────────────────────
        location /api/auth/ {
            proxy_pass         http://auth_service/auth/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ─── Prompt Service ────────────────────────────────────────────
        location /api/prompts/ {
            proxy_pass         http://prompt_service/prompts/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /api/images/ {
            proxy_pass         http://prompt_service/images/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            client_max_body_size 15M;
        }

        # ─── Social Service ────────────────────────────────────────────
        location /api/like/ {
            proxy_pass         http://social_service/like/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/comment/ {
            proxy_pass         http://social_service/comment/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/follow/ {
            proxy_pass         http://social_service/follow/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/collections/ {
            proxy_pass         http://social_service/collections/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/users/ {
            proxy_pass         http://social_service/users/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── AI Service ────────────────────────────────────────────────
        location /api/ai/ {
            proxy_pass         http://ai_service/ai/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # ML inference can be slow — extend timeouts
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ─── Gateway health ────────────────────────────────────────────
        location /health {
            return 200 '{"status":"healthy","gateway":"nginx"}';
            add_header Content-Type application/json;
        }
    }
}
